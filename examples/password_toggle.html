<!--
  Password visibility toggle for the Blackboard login page.
  Adds a show/hide eye button to the right of the password field.

  DEPENDENCIES
  - Bootstrap Icons CDN (for the eye icon) — or replace with your own icon approach.
  - .password-wrapper, #togglePassword CSS from login_styles.css

  HOW TO ADD TO THE JSP
  1. Add the Bootstrap Icons link inside <bbNG:cssBlock>:
       <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  2. Add the <script> block inside <bbNG:jsBlock>, after the platform scripts.
  3. The CSS rules are already in login_styles.css — load that file with bbNG:cssFile.

  NOTE
  - The password field id="password" is confirmed in the rendered HTML.
  - Uses DOMContentLoaded (same pattern as the other JS files in this repo).
  - The icon is aria-hidden; the button itself carries the accessible label.
-->

<!-- Bootstrap Icons (eye icon) — host locally if CDN access is restricted -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />

<script>
document.addEventListener("DOMContentLoaded", function () {
    var passwdInput = document.getElementById("password");
    if (!passwdInput) return;

    // Wrap the input in a relative container so the toggle button can overlay it
    var wrapper = document.createElement("div");
    wrapper.className = "password-wrapper";
    passwdInput.parentNode.insertBefore(wrapper, passwdInput);
    wrapper.appendChild(passwdInput);

    // Create the toggle button
    var toggleBtn = document.createElement("button");
    toggleBtn.type = "button";
    toggleBtn.id = "togglePassword";
    toggleBtn.setAttribute("aria-label", "Show password");
    toggleBtn.setAttribute("aria-pressed", "false");
    toggleBtn.innerHTML = '<i class="bi bi-eye-slash" aria-hidden="true"></i>';

    toggleBtn.addEventListener("click", function () {
        var isShowing = passwdInput.getAttribute("type") === "text";
        passwdInput.setAttribute("type", isShowing ? "password" : "text");
        this.setAttribute("aria-pressed", String(!isShowing));
        this.setAttribute("aria-label", isShowing ? "Show password" : "Hide password");
        this.innerHTML = '<i class="bi ' + (isShowing ? "bi-eye-slash" : "bi-eye") + '" aria-hidden="true"></i>';
    });

    wrapper.appendChild(toggleBtn);
});
</script>
